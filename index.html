<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 추첨기</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="container">
    <button id="theme-toggle" aria-label="테마 전환">🌙</button>
    <h1>로또 번호 추첨기</h1>
    <div id="ball-container">
      <div class="placeholder">추첨 버튼을 눌러주세요!</div>
    </div>
    <button id="generate-btn">번호 추첨하기</button>
  </div>

  <div class="container affiliate-container">
    <h2>제휴 문의</h2>
    <form action="https://formspree.io/f/mjgplzoa" method="POST">
      <div class="form-group">
        <label for="name">성함</label>
        <input type="text" id="name" name="name" required placeholder="성함을 입력해주세요">
      </div>
      <div class="form-group">
        <label for="email">이메일</label>
        <input type="email" id="email" name="_replyto" required placeholder="example@email.com">
      </div>
      <div class="form-group">
        <label for="company">회사/단체명</label>
        <input type="text" id="company" name="company" placeholder="회사 또는 단체명을 입력해주세요">
      </div>
      <div class="form-group">
        <label for="message">문의 내용</label>
        <textarea id="message" name="message" required placeholder="문의하실 내용을 상세히 적어주세요"></textarea>
      </div>
      <button type="submit" id="submit-btn">문의하기</button>
    </form>
  </div>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
